name: Build and Deploy Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install theme (standalone CLI mode)
        run: npm install jsonresume-theme-even

      - name: Split resume.json into zh/en
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('resume.json', 'utf-8'));
          const zh = { ...data.zh, meta: data.meta };
          fs.writeFileSync('resume.zh.json', JSON.stringify(zh));
          const en = { ...data.en, meta: data.meta };
          fs.writeFileSync('resume.en.json', JSON.stringify(en));
          "

      - name: Build Chinese HTML
        run: npx jsonresume-theme-even < resume.zh.json > index.zh.html

      - name: Build English HTML
        run: npx jsonresume-theme-even < resume.en.json > index.en.html

      - name: Build default index.html (Chinese)
        run: cp index.zh.html index.html

      - name: Inject toolbar (inline JS) + print styles into all HTML files
        run: |
          INJECT=$(cat inject.js)
          for f in index.html index.zh.html index.en.html; do
            # 1) 注入 viewport meta + 打印样式
            sed -i 's|</head>|<meta name="viewport" content="width=device-width, initial-scale=1.0"><style>@media print{body{box-shadow:none!important;max-width:100%!important;margin:0!important;padding:0!important}}#resume-toolbar{display:none!important}</style></head>|' "$f"
            # 2) 把 inject.js 完整内联到 </body> 前（不再依赖外部文件）
            sed -i "/<\/body>/i\\<script>${INJECT}<\/script>" "$f"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
