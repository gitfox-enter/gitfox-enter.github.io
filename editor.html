<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>简历编辑器 · JSON Resume</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/idea.min.css">
<style>
  :root { --bg:#f5f6f8; --border:#e2e4e8; --fg:#1d2327; --muted:#6c7781; --accent:#0073aa; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { display:flex; flex-direction:column; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--fg); background:var(--bg); }
  header { display:flex; align-items:center; gap:.75rem; padding:.6rem 1rem; background:#fff; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .spacer { flex:1; }
  header .hint { font-size:12px; color:var(--muted); }
  button, .btn { font:inherit; font-size:13px; padding:.4rem .7rem; border:1px solid var(--border); background:#fff; border-radius:6px; cursor:pointer; color:var(--fg); text-decoration:none; display:inline-flex; align-items:center; gap:.3rem; }
  button:hover, .btn:hover { border-color:var(--accent); color:var(--accent); }
  main { flex:1; display:flex; min-height:0; }
  .pane { flex:1; min-width:0; display:flex; flex-direction:column; }
  .pane.editor { border-right:1px solid var(--border); }
  .pane-head { padding:.35rem .8rem; font-size:12px; color:var(--muted); background:#fafbfc; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
  .CodeMirror { flex:1; height:auto; font-size:13px; font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
  #preview { flex:1; width:100%; border:0; background:#fff; }
  .error-bar { display:none; background:#fdecea; color:#b71c1c; font-size:12px; padding:.4rem .8rem; border-bottom:1px solid #f5c6cb; font-family:monospace; white-space:pre-wrap; }
  .error-bar.show { display:block; }
  @media (max-width:760px){ main{ flex-direction:column } .pane.editor{ border-right:0; border-bottom:1px solid var(--border) } }
</style>
</head>
<body>
<header>
  <h1>📝 简历编辑器</h1>
  <span class="hint">左侧编辑 JSON · 右侧实时预览（even 主题）</span>
  <span class="spacer"></span>
  <a class="btn" id="download" href="#">⬇ 下载</a>
  <button id="copy">📋 复制</button>
  <button id="reset">↺ 重置</button>
  <button id="print">🖨 打印</button>
  <a class="btn" href="https://github.com/gitfox-enter/gitfox-enter.github.io" target="_blank" rel="noopener">🔗 GitHub</a>
</header>
<main>
  <section class="pane editor">
    <div class="pane-head"><span>resume.json（JSON Resume 标准）</span><span id="status"></span></div>
    <div class="error-bar" id="error"></div>
    <textarea id="code"></textarea>
  </section>
  <section class="pane preview">
    <div class="pane-head"><span>实时预览</span></div>
    <iframe id="preview" title="预览"></iframe>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script type="module">
  import { render } from './even-browser.mjs';

  const STORAGE_KEY = 'resume-editor-json-v1';
  const initialObj = {
  "$schema": "https://raw.githubusercontent.com/jsonresume/resume-schema/v1.0.0/schema.json",

    "location": {
      "city": "合肥",
      "countryCode": "CN"
    },
    "profiles": [
      {
        "network": "GitHub",
        "username": "gitfox-enter",
        "url": "https://github.com/gitfox-enter"
      }
    ]
  },
  "work": [
    {
      "name": "安徽小库教育科技有限公司",
      "position": "市场专员",
      "startDate": "2024-09",

      "summary": "负责线下市场推广、用户引流及活动执行工作。",
      "highlights": [
        "负责线下市场地推、用户引流、场景宣传等基础推广工作，熟悉线下获客流程，具备基础市场洞察与推广执行能力",
        "协助团队完成营销活动策划落地、物料布置、现场执行、人员对接、流程跟进等工作，保障各类市场活动顺利落地",
        "主动对接客户咨询、耐心解答问题，积累了扎实的沟通表达、临场应变、统筹协调能力，抗压能力与落地执行力突出"
      ]
    }
  ],
  "volunteer": [
    {
      "organization": "亳州学院",
      "position": "志愿者",
      "startDate": "2026-07",
      "endDate": "",
      "summary": "负责新生报到引导、路线指引、物资分发、问题答疑等志愿服务工作。",
      "highlights": [
        "耐心对接师生，积极配合团队完成统筹工作",
        "有效锻炼了沟通协调、服务对接与团队协作能力，责任心强、执行力高"
      ]
    }
  ],
  "education": [
    {
      "institution": "亳州学院",
      "studyType": "专升本",

  ],
  "projects": [
    {

      "endDate": "",

    },
    {

        "熟悉服务行业标准化管理模式，实训成绩93分，做事严谨细致，具备规范化、流程化的工作思维"
      ]
    }
  ],
  "awards": [
    {
      "title": "普通话二级乙等",
      "date": "",
      "awarder": "",
      "summary": "语言表达清晰流畅，适合服务、行政、文职、运营类沟通型岗位"
    },
    {
      "title": "C2机动车驾驶证",
      "date": "",
      "awarder": "",
      "summary": "具备独立驾驶能力"
    }
  ],
  "skills": [
    {
      "name": "专业技能",
      "keywords": [
        "服务管理",
        "运营流程",
        "商务礼仪",
        "前厅客房运营",
        "餐饮标准化服务"
      ]
    },
    {
      "name": "工具与办公",
      "keywords": [
        "Word",
        "Excel",
        "PPT",
        "GitHub",
        "Docker"
      ]
    },
    {
      "name": "软技能",
      "keywords": [
        "沟通协调",
        "团队协作",
        "执行力",
        "责任心",
        "快速学习"
      ]
    }
  ],
  "languages": [
    {
      "language": "中文",
      "fluency": "母语"
    },
    {
      "language": "英语",
      "fluency": "能阅读技术文档"
    }
  ],
  "interests": [
    {
      "name": "技术折腾与自托管",
      "keywords": [
        "NAS",
        "Docker",
        "GitHub",
        "AI 工具"
      ]
    }
  ]
};
  const initial = JSON.stringify(initialObj, null, 2);

  const ta = document.getElementById('code');
  const cm = CodeMirror.fromTextArea(ta, {
    mode: { name: 'application/json' },
    lineNumbers: true,
    theme: 'idea',
    tabSize: 2,
    lineWrapping: true,
  });
  cm.setValue(localStorage.getItem(STORAGE_KEY) || initial);

  const iframe = document.getElementById('preview');
  const errBar = document.getElementById('error');
  const status = document.getElementById('status');
  let timer;

  function update() {
    const text = cm.getValue();
    localStorage.setItem(STORAGE_KEY, text);
    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      errBar.textContent = 'JSON 解析错误：' + e.message;
      errBar.classList.add('show');
      return;
    }
    errBar.classList.remove('show');
    try {
      const html = render(data);
      iframe.srcdoc = html;
      status.textContent = '✓ 已渲染';
    } catch (e) {
      errBar.textContent = '渲染错误：' + (e.message || e);
      errBar.classList.add('show');
    }
  }

  cm.on('change', () => {
    status.textContent = '编辑中…';
    clearTimeout(timer);
    timer = setTimeout(update, 300);
  });

  document.getElementById('download').addEventListener('click', (e) => {
    e.preventDefault();
    const blob = new Blob([cm.getValue()], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'resume.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });
  document.getElementById('copy').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(cm.getValue());
      const b = document.getElementById('copy');
      b.textContent = '✓ 已复制';
      setTimeout(() => (b.textContent = '📋 复制'), 1200);
    } catch (_) {}
  });
  document.getElementById('reset').addEventListener('click', () => {
    if (confirm('重置为初始简历数据？当前编辑将丢失。')) { cm.setValue(initial); update(); }
  });
  document.getElementById('print').addEventListener('click', () => {
    const w = iframe.contentWindow;
    if (w) w.print();
  });

  update();
</script>
</body>
</html>
